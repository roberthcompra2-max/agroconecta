<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgroConecta | Oficial</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #2e7d32; --secondary: #f57c00; --bg: #f4f7f6; --white: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }

        /* --- SPLASH ORIGINAL --- */
        #splash { position: fixed; inset: 0; background: var(--primary); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; transition: 0.8s; }
        #splash h1 { font-size: 2.2rem; letter-spacing: 3px; margin: 15px 0 5px 0; }
        .splash-anim { width: 50px; height: 3px; background: white; margin-top: 20px; position: relative; overflow: hidden; }
        .splash-anim::after { content: ''; position: absolute; left: -100%; top: 0; height: 100%; width: 100%; background: rgba(255,255,255,0.5); animation: loading 1.5s infinite; }
        @keyframes loading { to { left: 100%; } }

        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; position: sticky; top: 0; z-index: 1000; }

        /* --- TELAS --- */
        .screen { display: none; padding: 20px; box-sizing: border-box; min-height: calc(100vh - 60px); animation: fadeIn 0.4s ease; max-width: 600px; margin: 0 auto; }
        .active-screen { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; border: 1px solid #eee; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; outline: none; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }

        /* --- INDICADORES ESTÁTICOS --- */
        .status-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-item { background: white; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #e0e0e0; }
        .status-item small { display: block; font-size: 0.6rem; color: #777; text-transform: uppercase; }
        .status-item span { font-size: 1rem; font-weight: 800; color: var(--primary); }

        /* --- BUSCA --- */
        .search-box { background: white; padding: 10px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 20px; display: flex; align-items: center; }
        .search-box input { border: none; margin: 0; padding: 5px; }

        /* SELETOR DE PERFIL */
        .role-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .role-option { border: 2px solid #eee; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; color: #777; }
        .role-option i { font-size: 1.5rem; margin-bottom: 5px; display: block; }
        .role-option.selected { border-color: var(--primary); background: #e8f5e9; color: var(--primary); font-weight: bold; }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .prod-card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #eee; display: flex; flex-direction: column; }
        .img-container { width: 100%; height: 120px; background: #f0f0f0; }
        .prod-img { width: 100%; height: 100%; object-fit: cover; }
        .prod-info { padding: 10px; }
        .price { color: var(--secondary); font-weight: 800; }
    </style>
</head>
<body>

    <div id="splash">
        <i class="fas fa-seedling fa-5x"></i>
        <h1>AGROCONECTA</h1>
        <p>Campo e Cidade Conectados</p>
        <div class="splash-anim"></div>
    </div>

    <header>AGROCONECTA</header>

    <div id="screen-start" class="screen active-screen">
        <div class="card" style="margin-top: 40px; text-align: center;">
            <i class="fas fa-leaf fa-4x" style="color: var(--primary); margin-bottom: 20px;"></i>
            <h2>Bem-vindo!</h2>
            <button class="btn btn-primary" onclick="app.nav('screen-register')">CRIAR NOVA CONTA</button>
            <button class="btn btn-outline" onclick="app.nav('screen-login')">JÁ TENHO CONTA (LOGIN)</button>
        </div>
    </div>

    <div id="screen-register" class="screen">
        <div class="card">
            <h3>Cadastro</h3>
            <div class="role-box">
                <div id="opt-agri" class="role-option selected" onclick="app.setRole('agricultor')"><i class="fas fa-tractor"></i>Agricultor</div>
                <div id="opt-merc" class="role-option" onclick="app.setRole('supermercado')"><i class="fas fa-shopping-cart"></i>Mercado</div>
            </div>
            <input type="text" id="reg-user" placeholder="Usuário (Ex: joao123)">
            <input type="password" id="reg-pass" placeholder="Senha">
            <div id="form-agri">
                <input type="text" id="reg-nome" placeholder="Nome Completo">
                <input type="tel" id="reg-whats" placeholder="WhatsApp (DDD + Número)">
            </div>
            <div id="form-merc" style="display:none">
                <input type="text" id="reg-loja" placeholder="Nome do Estabelecimento">
            </div>
            <button class="btn btn-primary" onclick="app.register()">CADASTRAR</button>
            <button class="btn" style="background:none; color:#999" onclick="app.nav('screen-start')">Voltar</button>
        </div>
    </div>

    <div id="screen-login" class="screen">
        <div class="card" style="margin-top: 50px;">
            <h3>Login</h3>
            <input type="text" id="log-user" placeholder="Seu usuário">
            <input type="password" id="log-pass" placeholder="Sua senha">
            <button class="btn btn-primary" onclick="app.login()">ENTRAR</button>
            <button class="btn" style="background:none; color:#999" onclick="app.nav('screen-start')">Voltar</button>
        </div>
    </div>

    <div id="screen-main" class="screen">
        <div class="status-bar">
            <div class="status-item"><small>Dólar Comercial</small><span id="dolar-val">R$ ---</span></div>
            <div class="status-item"><small>Açailândia-MA</small><span>31°C</span></div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h3 id="user-title" style="margin:0">Olá!</h3>
            <button onclick="location.reload()" style="background:none; border:none; color:red; font-weight:bold">SAIR</button>
        </div>

        <div id="area-mercado" style="display:none">
            <div class="search-box">
                <i class="fas fa-search" style="color:var(--primary); margin-right:10px"></i>
                <input type="text" id="search-bar" placeholder="Buscar produto, cidade ou UF..." onkeyup="app.render()">
            </div>
            <div id="market-list" class="grid"></div>
        </div>

        <div id="area-agricultor" style="display:none">
            <div class="card">
                <h4 style="margin:0 0 10px 0">Novo Anúncio</h4>
                <input type="text" id="p-nome" placeholder="Produto">
                <input type="text" id="p-preco" placeholder="Preço">
                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px">
                    <input type="text" id="p-cidade" placeholder="Cidade">
                    <input type="text" id="p-uf" placeholder="UF" maxlength="2">
                </div>
                <input type="file" id="p-file" accept="image/*" onchange="app.previewImage(this)">
                <button class="btn btn-primary" onclick="app.postProduct()">PUBLICAR</button>
            </div>
            <div id="my-list" class="grid"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDcs7UM6RIP0GllwW99OAwSzfubCF3aMXM",
            authDomain: "agroconecta-d0247.firebaseapp.com",
            projectId: "agroconecta-d0247",
            storageBucket: "agroconecta-d0247.firebasestorage.app",
            messagingSenderId: "461195415877",
            appId: "1:461195415877:web:e72e7d6b9497b624b3ae2c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const app = {
            user: null, tempImg: null, allProducts: [], currentRole: 'agricultor',

            init() { 
                setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').style.display = 'none', 800); }, 2000); 
                this.fetchDolar();
            },

            nav(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.getElementById(id).classList.add('active-screen'); },

            setRole(role) {
                this.currentRole = role;
                document.getElementById('opt-agri').classList.toggle('selected', role === 'agricultor');
                document.getElementById('opt-merc').classList.toggle('selected', role === 'supermercado');
                document.getElementById('form-agri').style.display = role === 'agricultor' ? 'block' : 'none';
                document.getElementById('form-merc').style.display = role === 'supermercado' ? 'block' : 'none';
            },

            async fetchDolar() {
                try {
                    const r = await fetch('https://economia.awesomeapi.com.br/last/USD-BRL');
                    const d = await r.json();
                    document.getElementById('dolar-val').innerText = 'R$ ' + parseFloat(d.USDBRL.bid).toFixed(2);
                } catch(e) {}
            },

            async register() {
                const u = document.getElementById('reg-user').value.trim();
                const p = document.getElementById('reg-pass').value;
                if(!u || !p) return alert("Preencha Usuário e Senha!");
                
                const dados = {
                    user: u, pass: p, role: this.currentRole,
                    nome: this.currentRole === 'agricultor' ? document.getElementById('reg-nome').value : document.getElementById('reg-loja').value,
                    whats: this.currentRole === 'agricultor' ? document.getElementById('reg-whats').value : "000"
                };

                await db.collection("usuarios").doc(u).set(dados);
                alert("Cadastro realizado!"); this.nav('screen-login');
            },

            async login() {
                const u = document.getElementById('log-user').value.trim();
                const p = document.getElementById('log-pass').value;
                
                try {
                    const doc = await db.collection("usuarios").doc(u).get();
                    if(doc.exists && doc.data().pass === p) {
                        this.user = doc.data();
                        this.setupDashboard();
                        this.nav('screen-main');
                    } else { alert("Usuário ou senha incorretos!"); }
                } catch(e) { alert("Erro ao conectar!"); }
            },

            setupDashboard() {
                document.getElementById('user-title').innerText = "Olá, " + this.user.nome;
                document.getElementById('area-agricultor').style.display = this.user.role === 'agricultor' ? 'block' : 'none';
                document.getElementById('area-mercado').style.display = this.user.role === 'supermercado' ? 'block' : 'none';
                this.listenProducts();
            },

            previewImage(input) {
                const reader = new FileReader();
                reader.onload = (e) => { this.tempImg = e.target.result; };
                reader.readAsDataURL(input.files[0]);
            },

            async postProduct() {
                const n = document.getElementById('p-nome').value;
                const pr = document.getElementById('p-preco').value;
                if(!n || !this.tempImg) return alert("Falta foto ou nome!");
                await db.collection("produtos").add({
                    nome: n, preco: pr, foto: this.tempImg,
                    cidade: document.getElementById('p-cidade').value,
                    uf: document.getElementById('p-uf').value,
                    userId: this.user.user, whats: this.user.whats, timestamp: new Date().getTime()
                });
                alert("Publicado!");
            },

            listenProducts() {
                db.collection("produtos").orderBy("timestamp", "desc").onSnapshot(snap => {
                    this.allProducts = []; snap.forEach(doc => { this.allProducts.push(doc.data()); });
                    this.render();
                });
            },

            render() {
                const mList = document.getElementById('market-list');
                const myList = document.getElementById('my-list');
                const term = document.getElementById('search-bar').value.toLowerCase();
                mList.innerHTML = ""; myList.innerHTML = "";

                this.allProducts.forEach(p => {
                    const card = `<div class="prod-card">
                        <div class="img-container"><img src="${p.foto}" class="prod-img"></div>
                        <div class="prod-info">
                            <small>${p.cidade || ''} - ${p.uf || ''}</small><br>
                            <b>${p.nome}</b><br><span class="price">${p.preco}</span>
                            ${this.user.role === 'supermercado' ? `<a href="https://wa.me/55${p.whats}" class="btn-primary" style="text-decoration:none; font-size:0.7rem; padding:5px; margin-top:5px; border-radius:5px">NEGOCIAR</a>` : ''}
                        </div>
                    </div>`;
                    
                    const match = p.nome.toLowerCase().includes(term) || (p.cidade && p.cidade.toLowerCase().includes(term)) || (p.uf && p.uf.toLowerCase().includes(term));
                    if(match) mList.innerHTML += card;
                    if(p.userId === this.user.user) myList.innerHTML += card;
                });
            }
        };
        app.init();
    </script>
</body>
</html>
